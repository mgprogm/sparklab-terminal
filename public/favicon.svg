<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Sparklab Terminal">
  <!-- Warp-inspired: warm near-charcoal tile, off-white prompt glyph. -->
  <rect width="32" height="32" rx="7" fill="#2b2622"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25" fill="none" stroke="#3f3a36" stroke-width="1.5"/>
  <g fill="none" stroke="#f7f5f0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- prompt chevron -->
    <path d="M9 11.5 L14 16 L9 20.5"/>
  </g>
  <!-- cursor block -->
  <rect x="16.5" y="18.4" width="7" height="2.6" rx="1.1" fill="#f7f5f0"/>
</svg>
