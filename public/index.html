<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web Terminal</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      /* Fonts vendored locally (no CDN — CSP/offline safe). */
      @font-face {
        font-family: 'Inter Variable'; font-style: normal; font-weight: 100 900;
        font-display: swap; src: url('/vendor/fonts/inter-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'DM Mono'; font-style: normal; font-weight: 400;
        font-display: swap; src: url('/vendor/fonts/dm-mono-latin.woff2') format('woff2');
      }

      /* Warp-inspired theme. A single warm near-charcoal band; NO chromatic
         accent — the off-white primary (#f7f5f0) is the brand's only voltage,
         doubling as text and as button fill. Hairline depth, no shadows, tight
         3/4px radii. Inter for chrome, DM Mono for the terminal. */
      :root {
        --canvas: #2b2622;         /* warm dark — the only page surface */
        --canvas-soft: #383330;    /* cards, hover/active rows, inputs */
        --canvas-hover: #322d29;   /* subtle row hover, between the two */
        --hairline: #3f3a36;
        --ink: #f7f5f0;            /* primary text = brand off-white */
        --body-strong: #dad2c1;
        --body: #c9c0ad;
        --mute: #aea69c;
        --primary: #f7f5f0;        /* off-white — button fill, active indicator */
        --primary-hover: #e5e0d5;
        --on-primary: #2b2622;
        /* Functional connection/run state (not a brand accent), warm-tuned. */
        --ok: #9db989;
        --warn: #cbab6f;
        --danger: #cf8a76;
        --r-sm: 3px; --r-md: 4px; --r-lg: 6px; --r-pill: 9999px;
        --font-ui: 'Inter Variable', system-ui, -apple-system, 'Segoe UI', sans-serif;
        --font-mono: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, 'Courier New', monospace;
      }

      * { box-sizing: border-box; }
      /* The app shell fills the viewport exactly and must never page-scroll —
         terminal scrollback lives in xterm's own viewport, not the document. */
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--canvas); }
      #app {
        display: flex; height: 100vh; color: var(--body-strong);
        font: 14px/1.5 var(--font-ui);
        -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      }

      /* ---- Sidebar ---- */
      #sidebar {
        width: 248px; flex: 0 0 248px; display: flex; flex-direction: column;
        background: var(--canvas); border-right: 1px solid var(--hairline);
      }
      /* Collapsed rail: icons only. No width transition — one clean resize, not
         a burst of frames (xterm refits via the ResizeObserver on #term). */
      #app.collapsed #sidebar { width: 52px; flex-basis: 52px; }
      #app.collapsed #sidebar-head { justify-content: center; padding: 0; }
      #app.collapsed #sidebar-head strong { display: none; }
      #app.collapsed #new-session { padding: 6px 9px; }
      #app.collapsed .lbl { display: none; }
      #app.collapsed .session { justify-content: center; padding: 9px 0; gap: 0; }
      #app.collapsed .session .meta,
      #app.collapsed .session .del { display: none; }
      #app.collapsed #session-list { padding: 6px 4px; }
      #sidebar-head {
        display: flex; align-items: center; justify-content: space-between;
        height: 42px; padding: 0 14px; border-bottom: 1px solid var(--hairline);
      }
      #sidebar-head strong {
        font-size: 12px; font-weight: 500; letter-spacing: 0.4px;
        text-transform: uppercase; color: var(--mute);
      }
      #new-session {
        cursor: pointer; border: none; background: var(--primary); color: var(--on-primary);
        border-radius: var(--r-sm); padding: 6px 12px; font: 500 13px var(--font-ui);
        transition: background 120ms ease;
      }
      #new-session:hover { background: var(--primary-hover); }

      /* Footer collapse/expand toggle — full-width, always visible, keeps the
         42px sidebar-head free so it stays aligned with the main header. */
      #toggle-sidebar {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        flex: 0 0 auto; height: 38px; cursor: pointer; border: none;
        border-top: 1px solid var(--hairline); background: transparent;
        color: var(--mute); font: 500 12px var(--font-ui);
        letter-spacing: 0.3px; transition: background 120ms ease, color 120ms ease;
      }
      #toggle-sidebar:hover { background: var(--canvas-hover); color: var(--body); }
      #toggle-sidebar .chev { font-size: 14px; line-height: 1; }

      #session-list { flex: 1; min-height: 0; overflow-y: auto; list-style: none; margin: 0; padding: 6px; }
      .session {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 10px; cursor: pointer; border-radius: var(--r-md);
        border-left: 2px solid transparent; transition: background 120ms ease;
      }
      .session:hover { background: var(--canvas-hover); }
      .session.active { background: var(--canvas-soft); border-left-color: var(--primary); }
      .session .run-dot {
        width: 7px; height: 7px; border-radius: var(--r-pill);
        background: var(--mute); flex: 0 0 auto;
      }
      .session .run-dot.running { background: var(--ok); }
      .session .run-dot.attached { box-shadow: 0 0 0 2px rgba(157,185,137,0.28); }
      .session .meta { flex: 1; min-width: 0; }
      .session .name {
        display: block; font-size: 14px; color: var(--body); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }
      .session.active .name { color: var(--ink); }
      .session .cmd {
        display: block; font-family: var(--font-mono); color: var(--mute);
        font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .session .del {
        cursor: pointer; border: none; background: transparent; color: var(--mute);
        font-size: 15px; line-height: 1; padding: 2px 5px; border-radius: var(--r-sm);
        transition: background 120ms ease, color 120ms ease;
      }
      .session .del:hover { background: rgba(207,138,118,0.16); color: var(--danger); }

      #empty-state {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; text-align: center;
      }
      #empty-state p { margin: 0; color: var(--mute); }
      #create-first {
        cursor: pointer; border: none; background: var(--primary); color: var(--on-primary);
        border-radius: var(--r-sm); padding: 9px 16px; font: 500 14px var(--font-ui);
        transition: background 120ms ease;
      }
      #create-first:hover { background: var(--primary-hover); }

      /* ---- Main pane ---- */
      #main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--canvas); }
      #bar {
        display: flex; align-items: center; gap: 10px;
        height: 42px; padding: 0 16px; background: var(--canvas); border-bottom: 1px solid var(--hairline);
      }
      #bar #title { font-weight: 500; font-size: 14px; color: var(--ink); }
      #bar #title.none { color: var(--mute); font-weight: 400; }
      #status { display: flex; align-items: center; gap: 7px; margin-left: auto; }
      #statusText {
        font-size: 11px; font-weight: 500; letter-spacing: 0.4px;
        text-transform: uppercase; color: var(--mute);
      }
      #dot { width: 7px; height: 7px; border-radius: var(--r-pill); background: var(--mute); }
      #dot.connected { background: var(--ok); }
      #dot.reconnecting { background: var(--warn); }
      #dot.disconnected { background: var(--danger); }
      #term-wrap { flex: 1; min-height: 0; position: relative; overflow: hidden; background: var(--canvas); }
      #term { position: absolute; inset: 0; padding: 10px 8px; }
      .xterm { height: 100%; }
      #term-wrap.hidden { display: none; }

      /* Scrollbar (sidebar) tuned to the warm-dark palette. */
      #session-list::-webkit-scrollbar { width: 10px; }
      #session-list::-webkit-scrollbar-thumb {
        background: var(--canvas-soft); border-radius: var(--r-pill); border: 3px solid var(--canvas);
      }

      /* ---- Modal (replaces native prompt/confirm/alert) ---- */
      #modal-overlay {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center; padding: 24px;
        background: rgba(20, 17, 15, 0.62);
        -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
      }
      #modal-overlay.hidden { display: none; }
      #modal {
        width: 100%; max-width: 400px;
        /* Lives outside #app, so set the UI font here — otherwise the h2/p fall
           back to the UA default (Times) while only input/buttons look right. */
        font: 14px/1.5 var(--font-ui); color: var(--body-strong);
        -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
        background: var(--canvas-soft); border: 1px solid var(--hairline);
        border-radius: var(--r-lg); padding: 20px;
        display: flex; flex-direction: column; gap: 12px;
        animation: modal-in 120ms ease;
      }
      @keyframes modal-in {
        from { opacity: 0; transform: translateY(6px) scale(0.98); }
        to   { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) { #modal { animation: none; } }
      #modal h2 { margin: 0; font-size: 15px; font-weight: 600; color: var(--ink); }
      #modal p { margin: 0; font-size: 13.5px; line-height: 1.5; color: var(--body); }
      #modal-input {
        width: 100%; padding: 9px 11px; font: 14px var(--font-ui); color: var(--ink);
        background: var(--canvas); border: 1px solid var(--hairline);
        border-radius: var(--r-md); outline: none; transition: border-color 120ms ease;
      }
      #modal-input::placeholder { color: var(--mute); }
      #modal-input:focus { border-color: var(--primary); }
      #modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
      #modal-actions button {
        cursor: pointer; border-radius: var(--r-sm); padding: 8px 15px;
        font: 500 13px var(--font-ui); border: 1px solid transparent;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }
      .btn-primary { background: var(--primary); color: var(--on-primary); }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-ghost { background: transparent; color: var(--body); border-color: var(--hairline); }
      .btn-ghost:hover { background: var(--canvas-hover); color: var(--ink); }
      .btn-danger { background: var(--danger); color: var(--on-primary); }
      .btn-danger:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div id="sidebar-head">
          <strong>Sessions</strong>
          <button id="new-session" title="Create a new session"><span aria-hidden="true">+</span><span class="lbl">&nbsp;New</span></button>
        </div>
        <ul id="session-list"></ul>
        <button id="toggle-sidebar" title="Collapse sidebar" aria-label="Collapse sidebar" aria-expanded="true">
          <span class="chev" aria-hidden="true">«</span><span class="lbl">Collapse</span>
        </button>
      </div>

      <div id="main">
        <div id="bar">
          <span id="title">no session</span>
          <span id="status"><span id="dot"></span><span id="statusText">idle</span></span>
        </div>
        <div id="empty-state">
          <p>No sessions yet.</p>
          <button id="create-first">Create your first session</button>
        </div>
        <div id="term-wrap" class="hidden"><div id="term"></div></div>
      </div>
    </div>

    <div id="modal-overlay" class="hidden">
      <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title"></h2>
        <p id="modal-message"></p>
        <input id="modal-input" type="text" autocomplete="off" spellcheck="false" />
        <div id="modal-actions">
          <button id="modal-cancel" class="btn-ghost"></button>
          <button id="modal-confirm" class="btn-primary"></button>
        </div>
      </div>
    </div>

    <!-- Vendored locally: no CDN, CSP/offline safe. -->
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/vendor/addon-webgl.js"></script>
    <script src="/vendor/addon-web-links.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
